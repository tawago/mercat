[general]
editor = "vim"
pager = "less -R"

[display]
theme = "auto"
syntax_theme = "default"
width = 0
line_numbers = false
# How YAML front matter (--- metadata at the top of a file) is displayed:
#   "panel" (default) — banded metadata card
#   "dim"             — muted key/value list, no chrome
#   "compact"         — one status-bar-like line of key:value pairs
#   "raw"             — verbatim YAML including the --- fences
#   "hidden"          — stripped entirely
# Override for one run with MERCAT_FRONTMATTER=<style>.
frontmatter = "panel"

[mermaid]
enabled = true
style = "rounded"
# How an edge that crosses a subgraph frame border is drawn:
#   "bridge" (default) — frame stays solid, the edge bridges across it
#   "cross"            — legacy junction weld (a tee/cross on the border)
# Override for one run with MERCAT_SUBGRAPH_EDGES=bridge|cross.
subgraph_edges = "bridge"

[files]
show_hidden = false
extensions = ["md", "markdown", "mdown", "mkd"]
