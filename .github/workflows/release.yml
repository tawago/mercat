name: Release

on:
  push:
    tags:
      - v*

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ${{ matrix.os }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-linux-musl
            artifact: mdv-linux-x86_64.tar.gz
          - os: ubuntu-latest
            target: aarch64-linux-musl
            artifact: mdv-linux-aarch64.tar.gz
          - os: macos-latest
            target: x86_64-macos
            artifact: mdv-darwin-x86_64.tar.gz
          - os: macos-latest
            target: aarch64-macos
            artifact: mdv-darwin-aarch64.tar.gz

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.1

      - name: Install QEMU for foreign build helpers
        if: matrix.target == 'aarch64-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y qemu-user-static

      - name: Build release binary
        run: zig build -Doptimize=ReleaseSafe -Dtarget=${{ matrix.target }} -fqemu

      - name: Package archive and checksum
        shell: bash
        run: |
          mkdir -p dist
          cp zig-out/bin/mdv dist/mdv
          tar -C dist -czf ${{ matrix.artifact }} mdv
          shasum -a 256 ${{ matrix.artifact }} > ${{ matrix.artifact }}.sha256

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ matrix.artifact }}
            ${{ matrix.artifact }}.sha256

  update-homebrew-tap:
    runs-on: ubuntu-latest
    needs: build-release
    if: ${{ needs.build-release.result == 'success' }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      TAP_REPO: tawago/homebrew-mdv
      FORMULA_PATH: Formula/mdv.rb
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Update Homebrew tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          RELEASE_TAG: ${{ github.ref_name }}
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${HOMEBREW_TAP_TOKEN:-}" ]; then
            echo "HOMEBREW_TAP_TOKEN is not set"
            exit 1
          fi

          version="${RELEASE_TAG#v}"
          release_base="https://github.com/tawago/mdv/releases/download/${RELEASE_TAG}"

          darwin_arm_sha="$(curl -fsSL "${release_base}/mdv-darwin-aarch64.tar.gz.sha256" | cut -d' ' -f1)"
          darwin_x86_sha="$(curl -fsSL "${release_base}/mdv-darwin-x86_64.tar.gz.sha256" | cut -d' ' -f1)"
          linux_arm_sha="$(curl -fsSL "${release_base}/mdv-linux-aarch64.tar.gz.sha256" | cut -d' ' -f1)"
          linux_x86_sha="$(curl -fsSL "${release_base}/mdv-linux-x86_64.tar.gz.sha256" | cut -d' ' -f1)"

          workdir="$(mktemp -d)"
          trap 'rm -rf "$workdir"' EXIT

          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/${TAP_REPO}.git" "$workdir/tap"

          mkdir -p "$workdir/tap/Formula"

          {
            printf '%s\n' 'class Mdv < Formula'
            printf '%s\n' '  desc "Fast terminal markdown viewer with Mermaid diagram support"'
            printf '%s\n' '  homepage "https://github.com/tawago/mdv"'
            printf '%s\n' "  version \"${version}\""
            printf '%s\n' '  license "GPL-3.0-or-later"'
            printf '\n'
            printf '%s\n' '  on_macos do'
            printf '%s\n' '    on_arm do'
            printf '%s\n' '      url "https://github.com/tawago/mdv/releases/download/v#{version}/mdv-darwin-aarch64.tar.gz"'
            printf '%s\n' "      sha256 \"${darwin_arm_sha}\""
            printf '%s\n' '    end'
            printf '\n'
            printf '%s\n' '    on_intel do'
            printf '%s\n' '      url "https://github.com/tawago/mdv/releases/download/v#{version}/mdv-darwin-x86_64.tar.gz"'
            printf '%s\n' "      sha256 \"${darwin_x86_sha}\""
            printf '%s\n' '    end'
            printf '%s\n' '  end'
            printf '\n'
            printf '%s\n' '  on_linux do'
            printf '%s\n' '    on_arm do'
            printf '%s\n' '      url "https://github.com/tawago/mdv/releases/download/v#{version}/mdv-linux-aarch64.tar.gz"'
            printf '%s\n' "      sha256 \"${linux_arm_sha}\""
            printf '%s\n' '    end'
            printf '\n'
            printf '%s\n' '    on_intel do'
            printf '%s\n' '      url "https://github.com/tawago/mdv/releases/download/v#{version}/mdv-linux-x86_64.tar.gz"'
            printf '%s\n' "      sha256 \"${linux_x86_sha}\""
            printf '%s\n' '    end'
            printf '%s\n' '  end'
            printf '\n'
            printf '%s\n' '  def install'
            printf '%s\n' '    bin.install "mdv"'
            printf '%s\n' '  end'
            printf '\n'
            printf '%s\n' '  test do'
            printf '%s\n' '    assert_match version.to_s, shell_output("#{bin}/mdv --version")'
            printf '%s\n' '  end'
            printf '%s\n' 'end'
          } > "$workdir/tap/${FORMULA_PATH}"

          if [ ! -f "$workdir/tap/README.md" ]; then
            {
              printf '%s\n' '# homebrew-mdv'
              printf '\n'
              printf '%s\n' 'Homebrew tap for `mdv`.'
              printf '\n'
              printf '%s\n' '## Install'
              printf '\n'
              printf '%s\n' '```bash'
              printf '%s\n' 'brew tap tawago/homebrew-mdv'
              printf '%s\n' 'brew install mdv'
              printf '%s\n' '```'
            } > "$workdir/tap/README.md"
          fi

          cd "$workdir/tap"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet; then
            echo "Homebrew tap already up to date"
            exit 0
          fi

          git add "$FORMULA_PATH" README.md
          git commit -m "Update mdv formula to ${version}"
          git push origin main
